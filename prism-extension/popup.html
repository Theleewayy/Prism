<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <h1>PRISM</h1>

    <div class="site">
        Site: <span id="site">Loading...</span>
    </div>



    <div class="section">
        <h3>Privacy Analysis</h3>
        <div id="privacy" style="font-size:12px;">Loading...</div>
    </div>

    <div class="section">
        <h3>Policy Analysis</h3>
        <div id="policySummary" style="font-size:12px;">Scanning policy...</div>
        <div id="policyDetails" style="display:none; margin-top:5px; border-top:1px solid #334155; padding-top:5px;">
        </div>
        <label id="policyToggleLabel"
            style="font-size:11px; cursor:pointer; color:#60a5fa; display:none; margin-top:5px;">
            <input type="checkbox" id="policyToggle" style="display:none;"> <span>See Details</span>
        </label>
    </div>

    <div class="section">
        <h3>Warnings</h3>
        <ul id="warnings" style="font-size:12px; color:#ff4444; padding-left:20px; margin:5px 0 0 0;"></ul>
    </div>

    <div class="section">
        <h3>Cookie Protection</h3>

        <p id="essential">✔ Essential cookies allowed</p>
        <p id="tracking">❌ Tracking cookies blocked</p>
        <p id="ads">❌ Advertising cookies blocked</p>

    </div>

    <div class="section">
        <h3>Cookies in Use</h3>
        <label style="font-size: 12px; cursor: pointer;">
            <input type="checkbox" id="cookieToggle"> Show Accepted Cookies
        </label>
        <div id="cookieListContainer" style="display: none; margin-top: 10px;">
            <div id="cookieList" style="max-height: 150px; overflow-y: auto; font-size: 11px; margin-bottom: 5px;">
            </div>
            <button id="clearAllCookiesBtn" style="font-size: 11px; padding: 4px; background: #dc2626;">Turn Off All
                Known Cookies</button>
        </div>
    </div>




    <script src="domain-checker.js"></script>
    <script src="cookie-scanner.js"></script>
    <script src="privacy-main.js"></script>

</body>

</html>
